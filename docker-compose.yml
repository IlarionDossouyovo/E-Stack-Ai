services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: electron-ai-os-postgres
    environment:
      POSTGRES_DB: electron_ai_os
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: electron-ai-os-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    image: node:22-alpine
    container_name: electron-ai-os-backend
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: electron_ai_os
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_SYNCHRONIZE: "true"
      JWT_SECRET: electron-ai-os-super-secret-jwt-key-2024
      JWT_EXPIRES_IN: 7d
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_DEFAULT_MODEL: llama3.2:latest
      OLLAMA_MODELS: llama3.2:latest,llama3.1:8b,qwen2.5-coder:7b,phi3:mini,nomic-embed-text:latest
      FRONTEND_URL: http://localhost:3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "4000:4000"
    working_dir: /app
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npm install && npm run build && npm run start:dev"

  # Frontend
  frontend:
    image: node:22-alpine
    container_name: electron-ai-os-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    ports:
      - "3000:3000"
    working_dir: /app
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0"

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: electron-ai-os-network
