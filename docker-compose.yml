version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: estack-backend
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_HOST: host.docker.internal
      DATABASE_PORT: 5432
      DATABASE_NAME: estack_ai
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_SYNCHRONIZE: "true"
      JWT_SECRET: estack-ai-super-secret-jwt-key-2024
      JWT_EXPIRES_IN: 7d
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_DEFAULT_MODEL: mistral:latest
      OLLAMA_MODELS: mistral:latest,codellama:latest,phi3:latest,llama2:latest,nomic-embed-text:latest
      FRONTEND_URL: http://localhost:3001
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run start:dev

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: estack-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    ports:
      - "3001:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

networks:
  default:
    name: estack-network
